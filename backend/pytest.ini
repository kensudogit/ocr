[pytest]
# ── テスト探索設定 ──────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── レポート出力 ───────────────────────────────────────────────────────
addopts =
    --html=test-reports/report.html
    --self-contained-html
    --cov=src
    --cov-report=html:test-reports/coverage
    --cov-report=term-missing
    --cov-fail-under=60
    -v
    --tb=short
    --color=yes

# ── asyncio モード ─────────────────────────────────────────────────────
asyncio_mode = auto

# ── マーカー定義 ─────────────────────────────────────────────────────────
markers =
    unit: ユニットテスト（外部依存なし）
    integration: 統合テスト（DB/API 接続あり）
    slow: 実行に時間のかかるテスト
    invoice: インボイス番号検証テスト
    pii: PII マスクテスト
    security: セキュリティ関連テスト
    electronic_bookkeeping: 電子帳簿保存法テスト
