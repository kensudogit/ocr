[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[build.args]
# Set this to your Railway backend service URL, e.g.:
# NEXT_PUBLIC_API_URL = "https://ocr-backend-production.railway.app"
NEXT_PUBLIC_API_URL = "http://localhost:8000"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "frontend"
