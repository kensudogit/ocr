[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
buildContext = "."

[build.args]
# /api routes are proxied by Next.js server-side (app/api/[...path]/route.ts)
# so no direct backend URL is needed in the browser.
NEXT_PUBLIC_API_URL = "/api"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
