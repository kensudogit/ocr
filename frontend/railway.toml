[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
buildContext = "."

[build.args]
# Replace with your Railway backend service URL after deploying backend
# NEXT_PUBLIC_API_URL = "https://ocr-backend-production.railway.app"
NEXT_PUBLIC_API_URL = "http://localhost:8000"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
